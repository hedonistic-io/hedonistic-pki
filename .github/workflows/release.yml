name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: hedonistic-pki-darwin-arm64
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            name: hedonistic-pki-darwin-x86_64
            use_cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: hedonistic-pki-linux-x86_64
            use_cross: false
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: hedonistic-pki-linux-arm64
            use_cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
          targets: ${{ matrix.target }}
      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools
      - name: Install cross (Linux ARM64)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build with cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build with cross
        if: ${{ matrix.use_cross }}
        run: cross build --release --target ${{ matrix.target }}
      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/hedonistic-pki ${{ matrix.name }}
          shasum -a 512 ${{ matrix.name }} > ${{ matrix.name }}.sha512
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha512
