# Hedonistic LLC / Synthaer — Full PKI Ceremony Config
#
# This config drives the hedonistic-pki ceremony tool to generate the complete
# certificate hierarchy for Hedonistic LLC and all products under its banner.
#
# Reference: infrastructure/pki/README.md

name: hedonistic-synthaer
organization: Hedonistic LLC

passphrases:
  min_length: 16
  manager_hint: 1password

paper_backup:
  formats: [qr, pdf417]
  output: html
  include_pem: true

deployment:
  packages:
    - name: public
      target: deploy/public
      patterns: ["*.crt", "*.pub", "chain.crt"]
    - name: resonance-cloud
      target: deploy/resonance-cloud
      patterns: ["*.crt", "*.key", "chain.crt"]
    - name: offline-backup
      target: deploy/offline
      patterns: ["*.key", "*.crt"]

hierarchy:
  # ═══════════════════════════════════════════════════════════════
  # OFFLINE TIER
  # ═══════════════════════════════════════════════════════════════

  # 1: Root CA — the trust anchor
  - name: root-ca
    cn: "Hedonistic, LLC CA"
    cert_type: root
    algorithm: rsa_4096
    hash: sha512
    validity:
      years: 20
    offline: true
    parallel_keys: [ed25519]
    extensions:
      key_usage: [keyCertSign, cRLSign]
      basic_constraints_ca: true
    subject:
      country: US
      organization: "Hedonistic LLC"
    tags: [offline, ceremony, root]

  # 1a: General Intermediate CA — non-Synthaer signing
  - name: hedonistic-ic
    cn: "Hedonistic, LLC IC"
    cert_type: intermediate
    parent: root-ca
    algorithm: rsa_4096
    hash: sha512
    validity:
      years: 10
    pathlen: 0
    offline: true
    parallel_keys: [ed25519]
    extensions:
      key_usage: [digitalSignature, keyCertSign, cRLSign]
      extended_key_usage: [serverAuth, clientAuth, emailProtection]
      basic_constraints_ca: true
    subject:
      country: US
      organization: "Hedonistic LLC"
    tags: [offline, ceremony, general]

  # 2: Synthaer Intermediate CA — all Synthaer/Resonance signing
  - name: synthaer-ca
    cn: "d.b.a. Synthaer CA"
    cert_type: intermediate
    parent: root-ca
    algorithm: rsa_4096
    hash: sha512
    validity:
      years: 10
    pathlen: 1
    offline: true
    parallel_keys: [ed25519]
    extensions:
      key_usage: [keyCertSign, cRLSign]
      basic_constraints_ca: true
    subject:
      country: US
      organization: "Hedonistic LLC"
      organizational_unit: Synthaer
    tags: [offline, ceremony, synthaer]

  # ═══════════════════════════════════════════════════════════════
  # ONLINE TIER — Sub-CAs
  # ═══════════════════════════════════════════════════════════════

  # 3B: Code Signer Sub-CA — issues leaf code signing certs
  - name: code-signer-ca
    cn: "Synthaer Code Signer CA"
    cert_type: sub_ca
    parent: synthaer-ca
    algorithm: rsa_4096
    hash: sha512
    validity:
      years: 5
    pathlen: 0
    parallel_keys: [ed25519]
    extensions:
      key_usage: [keyCertSign, cRLSign]
      basic_constraints_ca: true
    subject:
      country: US
      organization: "Hedonistic LLC"
      organizational_unit: "Code Signing"
    tags: [online, sub-ca, code-signing]
    deploy_to: secrets-manager

  # 3P: Agent Identity Sub-CA — issues per-agent leaf certs
  - name: agent-identity-ca
    cn: "Synthaer Agent Identity CA"
    cert_type: sub_ca
    parent: synthaer-ca
    algorithm: rsa_4096
    hash: sha512
    validity:
      years: 5
    pathlen: 0
    parallel_keys: [ed25519]
    extensions:
      key_usage: [keyCertSign, cRLSign]
      basic_constraints_ca: true
    subject:
      country: US
      organization: "Hedonistic LLC"
      organizational_unit: "Synthaer Agent Identity"
    tags: [online, sub-ca, identity, agent]
    deploy_to: secrets-manager

  # 3Q: User Identity Sub-CA — issues per-user leaf certs
  - name: user-identity-ca
    cn: "Synthaer User Identity CA"
    cert_type: sub_ca
    parent: synthaer-ca
    algorithm: rsa_4096
    hash: sha512
    validity:
      years: 5
    pathlen: 0
    parallel_keys: [ed25519]
    extensions:
      key_usage: [keyCertSign, cRLSign]
      basic_constraints_ca: true
    subject:
      country: US
      organization: "Hedonistic LLC"
      organizational_unit: "Synthaer User Identity"
    tags: [online, sub-ca, identity, user]
    deploy_to: secrets-manager

  # ═══════════════════════════════════════════════════════════════
  # INTERACTIVE SIGNERS (passphrase-protected, 3yr)
  # ═══════════════════════════════════════════════════════════════

  # 3: Resonance Agent Signer — interactive agent attestations
  - name: resonance-agent-signer
    cn: "Resonance Agent Signer"
    cert_type: leaf
    parent: synthaer-ca
    algorithm: rsa_4096
    hash: sha512
    validity:
      years: 3
    parallel_keys: [ed25519]
    extensions:
      extended_key_usage: [lifetimeSigning]
    subject:
      organizational_unit: "Resonance Data Stage"
    tags: [interactive, dikw-data]

  # 3A: Resonance User Trust Signer — human trust endorsements
  - name: resonance-user-trust-signer
    cn: "Resonance User Trust Signer"
    cert_type: leaf
    parent: synthaer-ca
    algorithm: rsa_4096
    hash: sha512
    validity:
      years: 3
    parallel_keys: [ed25519]
    extensions:
      extended_key_usage: [emailProtection, clientAuth]
    subject:
      organizational_unit: "Resonance Information Stage"
    tags: [interactive, dikw-information]

  # 3C: Resonance Knowledge Provenance Signer — timestamped provenance
  - name: resonance-provenance-signer
    cn: "Resonance Knowledge Provenance Signer"
    cert_type: leaf
    parent: synthaer-ca
