    subject:
      organizational_unit: "Resonance Knowledge Stage"
    tags: [interactive, dikw-knowledge]

  # ═══════════════════════════════════════════════════════════════
  # CI SIGNERS — DATA STAGE (no passphrase, 1yr)
  # ═══════════════════════════════════════════════════════════════

  # 3D: Resonance Ingestion Signer
  - name: resonance-ingestion-signer
